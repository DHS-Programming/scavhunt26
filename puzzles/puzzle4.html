<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="puzzles-style.css">
  <title>Puzzle 4</title>
</head>
<body>
  <script>
    const PUZZLE_NUMBER = 4;

  <div class="header">
    <h1>Puzzle 4</h1>
    <button class="hint-btn" id="hint-button" onclick="openOverlay('hint-overlay')" style="display:none">?</button>
  </div>

  <div class="gate" id="not-complete-gate">
    <p>You need to complete Puzzle 3 before you can access this puzzle!</p>

  <div class="gate" id="key-gate">
    <p>Enter the key from Puzzle 3 to unlock this puzzle.</p>
    <div class="gate-row">
      <input type="text" id="key-input" placeholder="enter key..." autocomplete="off" />
      <button class="submit-btn" onclick="checkKey()">unlock</button>
    </div>
    <p class="gate-error" id="key-error"></p>
  </div>

  <div class="puzzle-content">
      <div class="puzzle-box">
        How do you like your eggs in the morning?<br><br>
        <strong style="font-size:1.3em; letter-spacing:0.1em;">vebstnsaeieierdl</strong>
      </div>
      <div class="code-row" style="margin-top: 1.5rem;">
        <label for="code-input">code:</label>
        <input type="text" id="code-input" placeholder="PCSHID{...}" autocomplete="off" />
        <button class="submit-btn" onclick="checkAnswer()">submit</button>

  </div>

  <a href="../index.html" class="back-btn">Back</a>

  <div class="overlay" id="hint-overlay">

  <div class="overlay" id="submit-overlay">
    <div class="overlay-card">

  </div>

  <script src="puzzle-scripts.js"></script>
</body>
</html>
